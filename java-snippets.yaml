  trie: |
    class TrieNode {
        TrieNode[] ch = new TrieNode[26];
        boolean end;
    }

    class Trie {
        private final TrieNode root = new TrieNode();

        void insert(String word) {
            TrieNode node = root;
            for (char c : word.toCharArray()) {
                int i = c - 'a';
                if (node.ch[i] == null) node.ch[i] = new TrieNode();
                node = node.ch[i];
            }
            node.end = true;
        }

        boolean search(String word) {
            TrieNode node = get(word);
            return node != null && node.end;
        }

        boolean startsWith(String prefix) { return get(prefix) != null; }

        private TrieNode get(String s) {
            TrieNode node = root;
            for (char c : s.toCharArray()) {
                node = node.ch[c - 'a'];
                if (node == null) return null;
            }
            return node;
        }
    }

  doubly-linked-list: |
    // LRU Cache — HashMap + DoublyLinkedList, O(1) get/put
    class LRUCache {
        private final int cap;
        private final Map<Integer, Node> map = new HashMap<>();
        private final Node head = new Node(0, 0); // dummy sentinels
        private final Node tail = new Node(0, 0);

        LRUCache(int capacity) {
            cap = capacity;
            head.next = tail; tail.prev = head;
        }

        public int get(int key) {
            if (!map.containsKey(key)) return -1;
            Node n = map.get(key);
            remove(n); addFront(n);
            return n.val;
        }

        public void put(int key, int value) {
            if (map.containsKey(key)) remove(map.get(key));
            if (map.size() == cap) remove(tail.prev); // evict LRU
            addFront(new Node(key, value));
        }

        private void remove(Node n) {
            map.remove(n.key);
            n.prev.next = n.next; n.next.prev = n.prev;
        }
        private void addFront(Node n) {
            map.put(n.key, n);
            n.next = head.next; n.prev = head;
            head.next.prev = n; head.next = n;
        }

        static class Node {
            int key, val; Node prev, next;
            Node(int k, int v) { key = k; val = v; }
        }
    }

  linkedhashmap: |
    // LRU Cache — one-liner Java shortcut
    class LRUCache extends LinkedHashMap<Integer, Integer> {
        private final int cap;
        LRUCache(int capacity) {
            super(capacity, 0.75f, true); // accessOrder = true
            cap = capacity;
        }
        public int get(int key) { return super.getOrDefault(key, -1); }
        public void put(int key, int value) { super.put(key, value); }

        @Override
        protected boolean removeEldestEntry(Map.Entry<Integer, Integer> e) {
            return size() > cap;
        }
    }

