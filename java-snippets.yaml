  union-find-algo: |
    class DSU {
        int[] parent, rank;
        int components;

        DSU(int n) {
            parent = new int[n]; rank = new int[n]; components = n;
            for (int i = 0; i < n; i++) parent[i] = i;
        }

        int find(int x) {
            if (parent[x] != x) parent[x] = find(parent[x]); // path compression
            return parent[x];
        }

        boolean union(int x, int y) {
            int rx = find(x), ry = find(y);
            if (rx == ry) return false;
            if (rank[rx] < rank[ry]) { int t=rx; rx=ry; ry=t; }
            parent[ry] = rx;
            if (rank[rx] == rank[ry]) rank[rx]++;
            components--;
            return true;
        }

        boolean connected(int x, int y) { return find(x) == find(y); }
    }

  dijkstra: |
    // Lazy Dijkstra — O((V + E) log V)
    int[] dist = new int[n];
    Arrays.fill(dist, Integer.MAX_VALUE);
    dist[src] = 0;

    // {distance, node}
    PriorityQueue<int[]> pq = new PriorityQueue<>(Comparator.comparingInt(a -> a[0]));
    pq.offer(new int[]{0, src});

    while (!pq.isEmpty()) {
        int[] cur = pq.poll();
        int d = cur[0], u = cur[1];
        if (d > dist[u]) continue;   // stale entry — skip

        for (int[] edge : graph[u]) {
            int v = edge[0], w = edge[1];
            if (dist[u] + w < dist[v]) {
                dist[v] = dist[u] + w;
                pq.offer(new int[]{dist[v], v});
            }
        }
    }

  kmp: |
    // Build LPS (failure function) — O(m)
    int[] lps = new int[pattern.length()];
    int len = 0, i = 1;
    while (i < pattern.length()) {
        if (pattern.charAt(i) == pattern.charAt(len)) {
            lps[i++] = ++len;
        } else if (len > 0) {
            len = lps[len - 1];    // fallback without advancing i
        } else {
            lps[i++] = 0;
        }
    }

    // Search — O(n), text pointer never backtracks
    int ti = 0, pi = 0;
    while (ti < text.length()) {
        if (text.charAt(ti) == pattern.charAt(pi)) { ti++; pi++; }
        if (pi == pattern.length()) {
            matches.add(ti - pi);  // match at ti - pi
            pi = lps[pi - 1];
        } else if (ti < text.length() && text.charAt(ti) != pattern.charAt(pi)) {
            if (pi > 0) pi = lps[pi - 1]; else ti++;
        }
    }

