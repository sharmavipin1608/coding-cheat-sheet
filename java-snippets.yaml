    // Iterative (explicit stack)
    Deque<Integer> stack = new ArrayDeque<>();
    boolean[] visited = new boolean[n];
    stack.push(start);
    while (!stack.isEmpty()) {
        int cur = stack.pop();
        if (visited[cur]) continue;
        visited[cur] = true;
        for (int nb : graph.get(cur)) stack.push(nb);
    }

  topological-sort: |
    // Kahn's BFS — O(V + E)
    Map<Integer, List<Integer>> adj = new HashMap<>();
    int[] inDeg = new int[numNodes];
    // build adj and inDeg from edges...

    Queue<Integer> queue = new ArrayDeque<>();
    for (int i = 0; i < numNodes; i++)
        if (inDeg[i] == 0) queue.offer(i);

    List<Integer> order = new ArrayList<>();
    while (!queue.isEmpty()) {
        int cur = queue.poll();
        order.add(cur);
        for (int next : adj.getOrDefault(cur, List.of())) {
            if (--inDeg[next] == 0) queue.offer(next);
        }
    }
    // order.size() < numNodes  →  cycle exists

  union-find-pattern: |
    int[] parent, rank;

    void init(int n) {
        parent = new int[n]; rank = new int[n];
        for (int i = 0; i < n; i++) parent[i] = i;
    }

    int find(int x) {
        if (parent[x] != x) parent[x] = find(parent[x]); // path compression
        return parent[x];
    }

    boolean union(int x, int y) {
        int rx = find(x), ry = find(y);
        if (rx == ry) return false;                        // already connected
        if (rank[rx] < rank[ry]) { int t=rx; rx=ry; ry=t; }
        parent[ry] = rx;
        if (rank[rx] == rank[ry]) rank[rx]++;
        return true;
    }

  backtracking: |
    List<List<Integer>> result = new ArrayList<>();

    void backtrack(int start, List<Integer> path, int[] nums) {
        result.add(new ArrayList<>(path));         // record current state

        for (int i = start; i < nums.length; i++) {
            if (i > start && nums[i] == nums[i-1]) continue; // skip duplicates
            path.add(nums[i]);                     // choose
            backtrack(i + 1, path, nums);          // explore
            path.remove(path.size() - 1);          // unchoose
        }
    }
    // Prep: Arrays.sort(nums); backtrack(0, new ArrayList<>(), nums);

  heap-pattern: |
    // Top-K largest — min-heap of size k
    PriorityQueue<Integer> minHeap = new PriorityQueue<>();
    for (int num : nums) {
        minHeap.offer(num);
        if (minHeap.size() > k) minHeap.poll(); // evict smallest
    }
    // heap top = k-th largest

    // Top-K by frequency
    Map<Integer, Integer> freq = new HashMap<>();
    for (int n : nums) freq.merge(n, 1, Integer::sum);

    PriorityQueue<Integer> pq = new PriorityQueue<>(Comparator.comparingInt(freq::get));
    for (int key : freq.keySet()) {
        pq.offer(key);
        if (pq.size() > k) pq.poll();
    }

    // Streaming median — two heaps
    PriorityQueue<Integer> lo = new PriorityQueue<>(Collections.reverseOrder()); // max-heap
    PriorityQueue<Integer> hi = new PriorityQueue<>();                            // min-heap

    void addNum(int num) {
        lo.offer(num);
        hi.offer(lo.poll());
        if (lo.size() < hi.size()) lo.offer(hi.poll());
    }
    double findMedian() {
        return lo.size() > hi.size() ? lo.peek() : (lo.peek() + hi.peek()) / 2.0;
    }

