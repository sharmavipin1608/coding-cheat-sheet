    // State: dp[i] = optimal answer for prefix of size i
    int[] dp = new int[n + 1];
    dp[0] = 0; dp[1] = /* base */;

    for (int i = 2; i <= n; i++) {
        dp[i] = Math.max(
            dp[i - 1],              // skip item i
            dp[i - 2] + val[i]      // take item i
        );
    }

    // Space optimisation — rolling two variables
    int prev2 = 0, prev1 = 0;
    for (int i = 0; i < n; i++) {
        int cur = Math.max(prev1, prev2 + nums[i]);
        prev2 = prev1; prev1 = cur;
    }

  dp-2d: |
    // LCS / Edit Distance skeleton
    int[][] dp = new int[m + 1][n + 1];
    // base cases: dp[0][j] = j (insert j chars), dp[i][0] = i (delete i chars)
    for (int i = 0; i <= m; i++) dp[i][0] = i;
    for (int j = 0; j <= n; j++) dp[0][j] = j;

    for (int i = 1; i <= m; i++) {
        for (int j = 1; j <= n; j++) {
            if (s1.charAt(i-1) == s2.charAt(j-1))
                dp[i][j] = dp[i-1][j-1];
            else
                dp[i][j] = 1 + Math.min(dp[i-1][j-1],
                                Math.min(dp[i-1][j], dp[i][j-1]));
        }
    }

  dp-knapsack: |
    // 0/1 Knapsack — iterate target in REVERSE to prevent reuse
    boolean[] dp = new boolean[target + 1];
    dp[0] = true;
    for (int num : nums)
        for (int t = target; t >= num; t--)
            dp[t] |= dp[t - num];

    // Unbounded Knapsack (coin change) — iterate target FORWARD
    int[] dp = new int[amount + 1];
    Arrays.fill(dp, amount + 1);
    dp[0] = 0;
    for (int coin : coins)
        for (int t = coin; t <= amount; t++)
            dp[t] = Math.min(dp[t], dp[t - coin] + 1);

  memoized-dfs: |
    Map<String, Integer> memo = new HashMap<>();

    int dfs(String s, int start) {
        String key = start + ""; // or encode full state
        if (memo.containsKey(key)) return memo.get(key);
        if (start == s.length()) return 0;  // base case

        int result = Integer.MAX_VALUE;
        for (String word : wordSet) {
            if (s.startsWith(word, start)) {
                int sub = dfs(s, start + word.length());
                if (sub != Integer.MAX_VALUE)
                    result = Math.min(result, 1 + sub);
            }
        }
        memo.put(key, result);
        return result;
    }

  kadane: |
    // Maximum sum subarray
    int cur = nums[0], best = nums[0];
    for (int i = 1; i < nums.length; i++) {
        cur  = Math.max(nums[i], cur + nums[i]);
        best = Math.max(best, cur);
    }

    // Maximum product subarray — track both max and min
    int maxP = nums[0], minP = nums[0], result = nums[0];
    for (int i = 1; i < nums.length; i++) {
        int a = maxP * nums[i], b = minP * nums[i];
        maxP = Math.max(nums[i], Math.max(a, b));
        minP = Math.min(nums[i], Math.min(a, b));
        result = Math.max(result, maxP);
    }

  interval: |
    // Merge intervals — sort by start
    Arrays.sort(intervals, (a, b) -> a[0] - b[0]);
    List<int[]> merged = new ArrayList<>();
    merged.add(intervals[0]);

    for (int[] cur : intervals) {
        int[] last = merged.get(merged.size() - 1);
        if (cur[0] <= last[1]) last[1] = Math.max(last[1], cur[1]); // overlap
        else merged.add(cur);
    }

    // Meeting Rooms II — min rooms needed
    Arrays.sort(intervals, (a, b) -> a[0] - b[0]);
    PriorityQueue<Integer> ends = new PriorityQueue<>(); // end times
    for (int[] iv : intervals) {
        if (!ends.isEmpty() && ends.peek() <= iv[0]) ends.poll(); // room freed
        ends.offer(iv[1]);
    }
    return ends.size(); // rooms in use

