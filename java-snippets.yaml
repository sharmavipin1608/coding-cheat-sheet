  two-pointers: |
    // Convergent — sorted array, find pair
    int left = 0, right = nums.length - 1;
    while (left < right) {
        int sum = nums[left] + nums[right];
        if (sum == target) return new int[]{left, right};
        else if (sum < target) left++;
        else right--;
    }

    // Same-direction — remove duplicates in-place
    int slow = 0;
    for (int fast = 1; fast < nums.length; fast++) {
        if (nums[fast] != nums[slow]) nums[++slow] = nums[fast];
    }
    return slow + 1;

  sliding-window-dynamic: |
    Map<Character, Integer> freq = new HashMap<>();
    int left = 0, maxLen = 0;

    for (int right = 0; right < s.length(); right++) {
        freq.merge(s.charAt(right), 1, Integer::sum);

        while (/* window invalid, e.g. freq.size() > k */) {
            char lc = s.charAt(left++);
            freq.merge(lc, -1, Integer::sum);
            if (freq.get(lc) == 0) freq.remove(lc);
        }

        maxLen = Math.max(maxLen, right - left + 1);
    }

  sliding-window-fixed: |
    // Build first window of size k
    Map<Character, Integer> need = new HashMap<>(), window = new HashMap<>();
    for (char c : p.toCharArray()) need.merge(c, 1, Integer::sum);
    int formed = 0, required = need.size();

    for (int right = 0; right < s.length(); right++) {
        char rc = s.charAt(right);
        window.merge(rc, 1, Integer::sum);
        if (need.containsKey(rc) && window.get(rc).equals(need.get(rc))) formed++;

        if (right >= k - 1) {          // window full
            if (formed == required) { /* match */ }
            char lc = s.charAt(right - k + 1);
            if (need.containsKey(lc) && window.get(lc).equals(need.get(lc))) formed--;
            window.merge(lc, -1, Integer::sum);
        }
    }

  fast-slow: |
    // Floyd's cycle detection
    ListNode slow = head, fast = head;
    while (fast != null && fast.next != null) {
        slow = slow.next;
        fast = fast.next.next;
        if (slow == fast) {
            // Cycle confirmed — find entry point
            slow = head;
            while (slow != fast) { slow = slow.next; fast = fast.next; }
            return slow; // cycle entry
        }
    }
    return null; // no cycle

  binary-search: |
    // Template 1 — exact match
    int lo = 0, hi = nums.length - 1;
    while (lo <= hi) {
        int mid = lo + (hi - lo) / 2;
        if (nums[mid] == target) return mid;
        else if (nums[mid] < target) lo = mid + 1;
        else hi = mid - 1;
    }

    // Template 2 — leftmost true (lower bound)
    int lo = 0, hi = nums.length;   // hi is exclusive
    while (lo < hi) {
        int mid = lo + (hi - lo) / 2;
        if (cond(mid)) hi = mid;
        else lo = mid + 1;
    }
    return lo; // first index where cond is true

    // Template 3 — rightmost true (upper bound)
    int lo = 0, hi = nums.length - 1;
    while (lo < hi) {
        int mid = lo + (hi - lo + 1) / 2; // bias upward to avoid infinite loop
        if (cond(mid)) lo = mid;
        else hi = mid - 1;
    }
    return lo;

