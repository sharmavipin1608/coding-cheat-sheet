  binary-search-algo: |
    // Arrays.binarySearch — returns index if found, -(insertion point)-1 if not
    int idx = Arrays.binarySearch(arr, key);
    if (idx < 0) idx = -(idx + 1); // insertion point

    // Manual — three templates (exact / leftmost / rightmost)
    // Exact:
    int lo = 0, hi = n - 1;
    while (lo <= hi) {
        int mid = lo + (hi - lo) / 2;
        if (arr[mid] == key) return mid;
        else if (arr[mid] < key) lo = mid + 1;
        else hi = mid - 1;
    }

    // Leftmost (first occurrence):
    int lo = 0, hi = n;
    while (lo < hi) { int mid = lo+(hi-lo)/2; if (arr[mid] >= key) hi=mid; else lo=mid+1; }
    return lo; // lo == n if not found

    // Rightmost (last occurrence):
    int lo = 0, hi = n;
    while (lo < hi) { int mid = lo+(hi-lo)/2; if (arr[mid] <= key) lo=mid+1; else hi=mid; }
    return lo - 1; // -1 if not found

